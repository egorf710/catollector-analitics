<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game Analytics</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQhkLlAhiTPYOEtzjG-WqeofyaNO3OLho",
  projectId: "catollector-analitics"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadSessions()
{
    const querySnapshot = await getDocs(collection(db, "sessions"));

    let table = document.getElementById("sessions");

    let totalFps = 0;
    let totalMinutes = 0;
    let count = 0;

    querySnapshot.forEach((doc) =>
    {
        const d = doc.data();

        let row = table.insertRow();

        row.insertCell().innerText = doc.id;
        row.insertCell().innerText = d.cpu;
        row.insertCell().innerText = d.gpu;
        row.insertCell().innerText = d.ramMB;
        row.insertCell().innerText = d.avgFps;
        row.insertCell().innerText = d.playMinutes;

        totalFps += Number(d.avgFps || 0);
        totalMinutes += Number(d.playMinutes || 0);

        count++;
    });

    document.getElementById("sessionsCount").innerText = count;

    if(count > 0)
    {
        document.getElementById("avgFps").innerText =
            (totalFps / count).toFixed(2);

        document.getElementById("totalPlay").innerText =
            totalMinutes.toFixed(1);
    }
}

loadSessions();

</script>

<style>

body
{
    font-family: Arial;
    margin: 40px;
    background: #f4f4f4;
}

table
{
    border-collapse: collapse;
    width: 100%;
    background: white;
}

th, td
{
    border: 1px solid #ccc;
    padding: 8px;
}

th
{
    background: #333;
    color: white;
}

.stats
{
    margin-bottom: 20px;
    font-size: 18px;
}

</style>

</head>

<body>

<h1>Game Analytics</h1>

<div class="stats">
Sessions: <span id="sessionsCount">0</span> |
Average FPS: <span id="avgFps">0</span> |
Total play minutes: <span id="totalPlay">0</span>
</div>

<table id="sessions">

<tr>
<th>Session ID</th>
<th>CPU</th>
<th>GPU</th>
<th>RAM MB</th>
<th>Avg FPS</th>
<th>Play Minutes</th>
</tr>

</table>

</body>
</html>
